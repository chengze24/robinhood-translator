AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Robinhood Translator backend — Lambda + API Gateway HTTP API

Parameters:
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key, passed at deploy time. Never commit this.

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.13

Resources:
  TranslatorApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - https://robinhood.com
        AllowMethods:
          - GET
          - POST
        AllowHeaders:
          - Content-Type

  TranslatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: main.handler
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          CACHE_TABLE_NAME: !Ref TranslationCache
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TranslationCache
      Events:
        Translate:
          Type: HttpApi
          Properties:
            ApiId: !Ref TranslatorApi
            Path: /translate
            Method: POST
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref TranslatorApi
            Path: /health
            Method: GET

  TranslationCache:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-translation-cache"
      AttributeDefinitions:
        - AttributeName: key
          AttributeType: S
      KeySchema:
        - AttributeName: key
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${TranslatorApi}.execute-api.${AWS::Region}.amazonaws.com"
